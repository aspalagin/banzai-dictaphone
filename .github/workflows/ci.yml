name: Проверки

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.lock
      - run: python -m unittest discover -s server/tests -v
  android-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n android/build-apk.sh
      - run: python3 -c "import xml.etree.ElementTree as e; e.parse('android/AndroidManifest.xml')"
