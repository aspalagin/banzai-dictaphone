name: Сообщение об ошибке
description: Сообщите о воспроизводимой ошибке без секретов и персональных данных.
title: "Ошибка: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Что произошло и чего вы ожидали?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Не включайте токены, аудио или транскрипты.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версия или коммит
  - type: textarea
    id: logs
    attributes:
      label: Безопасные логи
      description: Удалите токены, адреса и персональные данные.
